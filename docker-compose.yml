version: "3.9"

services:
  # ── Vector store ────────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: deepsearch_qdrant
    ports:
      - "6333:6333"   # HTTP / REST + gRPC
      - "6334:6334"   # gRPC (alternative)
    volumes:
      - ./qdrant_storage:/qdrant/storage
    restart: unless-stopped

  # ── Semantic cache ───────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: deepsearch_redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis_data:/data
    restart: unless-stopped

  # ── FastAPI backend ──────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: deepsearch_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Override service URLs so the API container reaches Qdrant/Redis
      # by their Docker network hostnames, not localhost.
      QDRANT_URL: http://qdrant:6333
      REDIS_URL: redis://redis:6379
    depends_on:
      - qdrant
      - redis
    restart: unless-stopped
    volumes:
      # Hot-reload in development: mount source into container.
      - .:/app
    command: ["uvicorn", "backend.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

volumes:
  
  redis_data:
